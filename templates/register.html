<!DOCTYPE html>
<html>
<head><title>Register</title>
<style>body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#27ae60;}
.box{background:white;padding:40px;border-radius:10px;}input{display:block;width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#2980b9;color:white;border:none;border-radius:5px;cursor:pointer;}</style></head>
<body>
<div class="box">
<h2>Register</h2>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Register</button>
</form>
<p><a href="/login">Already have an account?</a></p>
</div>
</body>
</html>
