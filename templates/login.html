<!DOCTYPE html>
<html>
<head><title>Login</title>
<style>body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#2980b9;}
.box{background:white;padding:40px;border-radius:10px;}input{display:block;width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#27ae60;color:white;border:none;border-radius:5px;cursor:pointer;}</style></head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p><a href="/register">Create account</a></p>
</div>
</body>
</html>
